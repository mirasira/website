<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariánská skála - ÚSTÍ GUIDE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../static/css/usti_style.css">
</head>

<body>
    <!-- Hero -->
    <section class="hero" style="min-height: 40vh;">
        <div class="hero-content">
            <div class="logo-container">
                <img src="../static/images/others/usti.svg" class="logo-svg" alt="ÚSTÍ">
                <div class="guide-text" style="font-size: clamp(2rem, 5vw, 4rem);">MARIÁNSKÁ SKÁLA</div>
            </div>
        </div>
    </section>

    <div class="section-divider"></div>

    <section class="grid-section">
        <div class="content-block">
            <a href="../usti_guide.html" class="btn" style="display: inline-block; margin-bottom: 20px;">← ZPĚT NA
                HLAVNÍ STRÁNKU</a>
        </div>
    </section>

    <div class="section-divider"></div>

    <!-- Map Section -->
    <section class="grid-section map-container">
        <div id="map" style="height: 400px; width: 100%;"></div>
    </section>

    <div class="section-divider"></div>

    <!-- Views Section -->
    <section class="grid-section">
        <div class="content-block inverse" style="width: 100%;">
            <h2>VÝHLED</h2>
            <div style="display: flex; flex-direction: column; gap: 20px; margin: 20px 0;">
                <img src="vyhled_marianska_skala.png" alt="Výhled z Mariánské skály"
                    style="width: 100%; border-radius: 8px;">
            </div>

        </div>
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="places.js"></script>
    <script>
        // Coordinates for Mariánská skála
        const placeLat = 50.6618700;
        const placeLon = 14.0518008;

        const map = L.map('map').setView([placeLat, placeLon], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        // Add marker for Mariánská skála
        L.marker([placeLat, placeLon], {
            icon: L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background: #0055ff; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 1.2rem; border: 4px solid #fff; font-family: Arial Black;">10</div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            })
        }).addTo(map).bindPopup('<strong>Mariánská skála</strong>').openPopup();

    </script>
</body>

</html>
